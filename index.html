<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset Management System</title>
    <!-- Core Streaming Engine -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Premium Font Family -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
      body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
      .header { background: #050505; padding: 15px 30px; display: flex; align-items: center; border-bottom: 1px solid #333; }
      .header h1 { font-size: 24px; font-weight: 600; letter-spacing: 2px; color: #ffffff; }
      .header span { color: #888; font-weight: 300; }
      .main-container { display: flex; flex: 1; height: calc(100vh - 65px); }
      .viewport-section { flex: 7; background: #000; display: flex; justify-content: center; align-items: center; border-right: 1px solid #222; }
      video { width: 100%; height: 100%; background: #000; object-fit: contain; }
      .sidebar { flex: 3; background: #0a0a0a; display: flex; flex-direction: column; }
      .search-container { padding: 20px; background: #0a0a0a; border-bottom: 1px solid #222; }
      .search-container input { width: 100%; padding: 14px 20px; font-size: 15px; border: 1px solid #333; border-radius: 30px; background: #111; color: #fff; outline: none; transition: all 0.3s ease; }
      .search-container input:focus { border-color: #fff; background: #1a1a1a; }
      
      /* Grid adjustments for older browsers */
      .asset-grid { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-content: flex-start; }
      .asset-grid::-webkit-scrollbar { width: 6px; }
      .asset-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
      .asset-grid::-webkit-scrollbar-thumb:hover { background: #fff; }
      
      /* Changed width to calc(33.33% - 10px) to display 3 items per row */
      .item-card { background: #111; border: 1px solid #222; border-radius: 12px; height: 90px; width: calc(33.33% - 10px); padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s ease; }
      .item-card:hover { transform: translateY(-3px); background: #1a1a1a; border-color: #555; box-shadow: 0 5px 15px rgba(255, 255, 255, 0.05); }
      .item-card img { max-width: 100%; max-height: 50px; object-fit: contain; margin-bottom: 5px; }
      .item-card span { font-size: 11px; text-align: center; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
      .active-item { background: #fff !important; border-color: #fff !important; color: #000 !important; transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
      .active-item span { color: #000; font-weight: 600; }
      .active-item img { filter: brightness(0.2); }

      @media (max-width: 900px) {
        .main-container { flex-direction: column; }
        .viewport-section { flex: none; height: 35vh; border-right: none; border-bottom: 1px solid #333; }
        .sidebar { flex: 1; height: 65vh; }
      }
      @media (max-width: 500px) {
        /* Mobile view fallback to 2 items */
        .item-card { width: calc(50% - 8px); } 
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>CORE<span>ASSETS</span></h1>
    </div>

    <div class="main-container">
      <div class="viewport-section">
        <video id="main-player" controls autoplay playsinline></video>
      </div>

      <div class="sidebar">
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterItems()" />
        </div>
        <div class="asset-grid" id="assetGrid"></div>
      </div>
    </div>

    <script>
      var cacheBuster = new Date().getTime();
      var dataSourceUrl = "https://gist.githubusercontent.com/ayonpaulofficial-bit/0634edaf19b269aba5bf62523cc19e15/raw/1ee20cf24a32eed31d9c8733202972aa7189176c/sdyt.m3u?cb=" + cacheBuster;
      var totalItems = [];
      var corePlayer = document.getElementById("main-player");

      function assignPriority(itemName) {
        var str = itemName.toLowerCase();
        if (str.indexOf("zee Bangla HD") !== -1) return 1;
        return 999;
      }

      function buildGrid() {
        var grid = document.getElementById("assetGrid");
        grid.innerHTML = "";

        for (var i = 0; i < totalItems.length; i++) {
          var item = totalItems[i];
          var card = document.createElement("div");
          card.className = "item-card";
          card.id = "item-" + i;

          if (item.logo) {
            card.innerHTML = '<img src="' + item.logo + '" alt="' + item.name + '" onerror="this.style.display=\'none\'"> <span>' + item.name + '</span>';
          } else {
            card.innerHTML = '<span>' + item.name + '</span>';
          }

          (function(index) {
            card.onclick = function() { streamSource(index); };
          })(i);

          grid.appendChild(card);
        }
      }

      function streamSource(index) {
        var item = totalItems[index];

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          var hls = new Hls();
          hls.loadSource(item.url);
          hls.attachMedia(corePlayer);
          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            var playPromise = corePlayer.play();
            if (playPromise !== undefined) {
              playPromise.catch(function(error) {
                console.log("Autoplay blocked. Needs user interaction.");
              });
            }
          });
        } else if (corePlayer.canPlayType("application/vnd.apple.mpegurl")) {
          corePlayer.src = item.url;
          corePlayer.addEventListener("loadedmetadata", function () {
            var playPromise = corePlayer.play();
            if (playPromise !== undefined) {
              playPromise.catch(function(error) {
                console.log("Autoplay blocked. Needs user interaction.");
              });
            }
          });
        }

        var allCards = document.querySelectorAll(".item-card");
        for (var j = 0; j < allCards.length; j++) {
          allCards[j].classList.remove("active-item");
        }
        
        var activeCard = document.getElementById("item-" + index);
        if (activeCard) {
          activeCard.classList.add("active-item");
          if (activeCard.scrollIntoView) {
            activeCard.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }
        }
      }

      function filterItems() {
        var query = document.getElementById("searchInput").value.toLowerCase();
        var cards = document.querySelectorAll(".item-card");

        for (var i = 0; i < totalItems.length; i++) {
          if (totalItems[i].name.toLowerCase().indexOf(query) !== -1) {
            cards[i].style.display = "flex";
          } else {
            cards[i].style.display = "none";
          }
        }
      }

      var xhr = new XMLHttpRequest();
      xhr.open("GET", dataSourceUrl, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && (xhr.status === 200 || xhr.status === 0)) {
          var data = xhr.responseText;
          var lines = data.split("\n");
          var currentItem = null;

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (line.indexOf("#EXTINF") === 0) {
              var name = "Unknown Asset";
              var nameSplit = line.split(",");
              if (nameSplit.length > 1) {
                name = nameSplit[1].trim();
              }

              var logo = "";
              var logoMatch = line.match(/tvg-logo="(.*?)"/);
              if (logoMatch) {
                logo = logoMatch[1];
              }

              currentItem = { name: name, logo: logo };
            } else if (line && line.indexOf("#") !== 0) {
              if (currentItem) {
                currentItem.url = line;
                totalItems.push(currentItem);
                currentItem = null;
              }
            }
          }

          totalItems.sort(function(a, b) {
            return assignPriority(a.name) - assignPriority(b.name);
          });

          buildGrid();

          if (totalItems.length > 0) {
            streamSource(0);
          }
        }
      };
      xhr.send();
    </script>
  </body>
</html>
